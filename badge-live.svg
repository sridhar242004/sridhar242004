<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 32" width="140" height="32">
  <defs>
    <linearGradient id="badgeBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981">
        <animate attributeName="stop-color" values="#10b981;#06b6d4;#7c3aed;#10b981" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#06b6d4">
        <animate attributeName="stop-color" values="#06b6d4;#7c3aed;#10b981;#06b6d4" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#7c3aed">
        <animate attributeName="stop-color" values="#7c3aed;#10b981;#06b6d4;#7c3aed" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="badgeFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#030210" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0a0a2e" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="badgeGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="coreGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.5" result="b1"/>
      <feGaussianBlur stdDeviation="5" result="b2"/>
      <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer animated border -->
  <rect x="1" y="1" width="138" height="30" rx="15" fill="none" stroke="url(#badgeBorder)" stroke-width="1.5" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.5;0.9" dur="2s" repeatCount="indefinite"/>
  </rect>

  <!-- Inner background -->
  <rect x="3" y="3" width="134" height="26" rx="13" fill="url(#badgeFill)"/>

  <!-- Scanning line -->
  <line x1="3" y1="3" x2="137" y2="3" stroke="#10b981" stroke-width="1" opacity="0.6">
    <animate attributeName="y1" values="3;29;3" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="3;29;3" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0;0.6" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- Pulsing core dot -->
  <circle cx="22" cy="16" r="5" fill="#10b981" filter="url(#coreGlow)">
    <animate attributeName="r" values="5;7;5" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="22" cy="16" r="2.5" fill="#ffffff"/>

  <!-- Orbiting ring around dot -->
  <circle cx="22" cy="16" r="8" fill="none" stroke="#10b981" stroke-width="0.5" opacity="0.4" stroke-dasharray="10 10">
    <animateTransform attributeName="transform" type="rotate" from="0 22 16" to="360 22 16" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- LIVE text -->
  <text x="42" y="20" font-family="monospace" font-size="12" font-weight="800" fill="#ffffff" letter-spacing="3" filter="url(#badgeGlow)">LIVE</text>

  <!-- Animated shimmer on border -->
  <rect x="1" y="1" width="138" height="30" rx="15" fill="none" stroke="#ffffff" stroke-width="1" stroke-dasharray="30 110" opacity="0.3">
    <animate attributeName="stroke-dashoffset" values="0;-140" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>
