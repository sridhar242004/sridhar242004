<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 28" width="120" height="28">
  <defs>
    <linearGradient id="liveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="liveGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Badge background -->
  <rect x="1" y="1" width="118" height="26" rx="13" fill="none" stroke="url(#liveGrad)" stroke-width="1.5" opacity="0.8"/>
  <rect x="3" y="3" width="114" height="22" rx="11" fill="#030210" opacity="0.6"/>

  <!-- Pulsing dot -->
  <circle cx="18" cy="14" r="4" fill="#10b981" filter="url(#liveGlow)">
    <animate attributeName="r" values="4;5.5;4" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="18" cy="14" r="2" fill="#ffffff"/>

  <!-- LIVE text -->
  <text x="34" y="18" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="700" fill="#ffffff" letter-spacing="2">LIVE</text>

  <!-- Animated border shimmer -->
  <rect x="1" y="1" width="118" height="26" rx="13" fill="none" stroke="#10b981" stroke-width="1" stroke-dasharray="20 100" opacity="0.5">
    <animate attributeName="stroke-dashoffset" values="0;-120" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>