<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0"/>
      <stop offset="50%" stop-color="#7c3aed" stop-opacity="1"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
    <filter id="orbitGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Orbit rings -->
  <ellipse cx="300" cy="100" rx="250" ry="60" fill="none" stroke="#1a1a3e" stroke-width="1"/>
  <ellipse cx="300" cy="100" rx="250" ry="60" fill="none" stroke="url(#orbitGrad)" stroke-width="1.5" stroke-dasharray="10 20" opacity="0.6" filter="url(#orbitGlow)">
    <animateTransform attributeName="transform" type="rotate" from="0 300 100" to="360 300 100" dur="30s" repeatCount="indefinite"/>
  </ellipse>

  <ellipse cx="300" cy="100" rx="180" ry="40" fill="none" stroke="#1a1a3e" stroke-width="1"/>
  <ellipse cx="300" cy="100" rx="180" ry="40" fill="none" stroke="#06b6d4" stroke-width="1" stroke-dasharray="8 16" opacity="0.4">
    <animateTransform attributeName="transform" type="rotate" from="360 300 100" to="0 300 100" dur="25s" repeatCount="indefinite"/>
  </ellipse>

  <ellipse cx="300" cy="100" rx="100" ry="25" fill="none" stroke="#1a1a3e" stroke-width="1"/>
  <ellipse cx="300" cy="100" rx="100" ry="25" fill="none" stroke="#10b981" stroke-width="1" stroke-dasharray="6 12" opacity="0.3">
    <animateTransform attributeName="transform" type="rotate" from="0 300 100" to="360 300 100" dur="20s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Center core -->
  <circle cx="300" cy="100" r="8" fill="#7c3aed" filter="url(#orbitGlow)">
    <animate attributeName="r" values="8;10;8" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="100" r="4" fill="#ffffff"/>

  <!-- Orbiting nodes -->
  <g>
    <circle cx="0" cy="0" r="4" fill="#06b6d4" filter="url(#orbitGlow)">
      <animateMotion path="M 300 100 m -250 0 a 250 60 0 1 0 500 0 a 250 60 0 1 0 -500 0" dur="15s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g>
    <circle cx="0" cy="0" r="3" fill="#10b981" filter="url(#orbitGlow)">
      <animateMotion path="M 300 100 m -180 0 a 180 40 0 1 1 360 0 a 180 40 0 1 1 -360 0" dur="12s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g>
    <circle cx="0" cy="0" r="3" fill="#f59e0b" filter="url(#orbitGlow)">
      <animateMotion path="M 300 100 m -100 0 a 100 25 0 1 0 200 0 a 100 25 0 1 0 -200 0" dur="10s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Labels -->
  <text x="300" y="180" font-family="'JetBrains Mono', monospace" font-size="10" fill="#6b7280" text-anchor="middle" letter-spacing="3">ZERO-BACKEND · ONE-FILE · FULL CINEMATIC</text>
</svg>
