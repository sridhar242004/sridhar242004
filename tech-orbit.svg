<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="800" height="220" preserveAspectRatio="xMidYMid meet">
  <defs>
    <filter id="starGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="lineGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="220" fill="#030210" opacity="0.2" rx="12"/>

  <!-- Central core -->
  <g transform="translate(400, 110)">
    <circle r="12" fill="#7c3aed" opacity="0.3" filter="url(#starGlow)">
      <animate attributeName="r" values="12;16;12" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.1;0.3" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle r="6" fill="#7c3aed" filter="url(#starGlow)">
      <animate attributeName="r" values="6;8;6" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" fill="#ffffff"/>

    <!-- Orbital rings -->
    <ellipse rx="180" ry="50" fill="none" stroke="#7c3aed" stroke-width="0.5" opacity="0.2" stroke-dasharray="8 12">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="30s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse rx="130" ry="35" fill="none" stroke="#06b6d4" stroke-width="0.5" opacity="0.15" stroke-dasharray="6 10">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="25s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse rx="80" ry="22" fill="none" stroke="#10b981" stroke-width="0.5" opacity="0.12" stroke-dasharray="4 8">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Tech nodes on outer orbit -->
  <g filter="url(#starGlow)">
    <!-- Node positions calculated on ellipses -->
    <circle r="4" fill="#7c3aed">
      <animateMotion path="M 400 110 m -180 0 a 180 50 0 1 0 360 0 a 180 50 0 1 0 -360 0" dur="15s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle r="4" fill="#06b6d4">
      <animateMotion path="M 400 110 m -180 0 a 180 50 0 1 1 360 0 a 180 50 0 1 1 -360 0" dur="18s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle r="3.5" fill="#10b981">
      <animateMotion path="M 400 110 m -130 0 a 130 35 0 1 0 260 0 a 130 35 0 1 0 -260 0" dur="12s" repeatCount="indefinite"/>
    </circle>
    <circle r="3.5" fill="#f59e0b">
      <animateMotion path="M 400 110 m -130 0 a 130 35 0 1 1 260 0 a 130 35 0 1 1 -260 0" dur="14s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" fill="#ec4899">
      <animateMotion path="M 400 110 m -80 0 a 80 22 0 1 0 160 0 a 80 22 0 1 0 -160 0" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" fill="#c4b5fd">
      <animateMotion path="M 400 110 m -80 0 a 80 22 0 1 1 160 0 a 80 22 0 1 1 -160 0" dur="11s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Connection lines to center (pulsing) -->
  <g stroke="#7c3aed" stroke-width="0.5" opacity="0.15" filter="url(#lineGlow)">
    <line x1="400" y1="110" x2="220" y2="110" stroke-dasharray="4 4">
      <animate attributeName="stroke-dashoffset" values="0;-16" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;0.3;0.15" dur="4s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="110" x2="580" y2="110" stroke-dasharray="4 4">
      <animate attributeName="stroke-dashoffset" values="0;-16" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;0.3;0.15" dur="5s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="110" x2="400" y2="60" stroke-dasharray="4 4">
      <animate attributeName="stroke-dashoffset" values="0;-16" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;0.3;0.15" dur="3s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="110" x2="400" y2="160" stroke-dasharray="4 4">
      <animate attributeName="stroke-dashoffset" values="0;-16" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;0.3;0.15" dur="3.5s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="110" x2="270" y2="75" stroke-dasharray="4 4" opacity="0.1">
      <animate attributeName="stroke-dashoffset" values="0;-16" dur="1.8s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="110" x2="530" y2="75" stroke-dasharray="4 4" opacity="0.1">
      <animate attributeName="stroke-dashoffset" values="0;-16" dur="2.1s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="110" x2="270" y2="145" stroke-dasharray="4 4" opacity="0.1">
      <animate attributeName="stroke-dashoffset" values="0;-16" dur="2.3s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="110" x2="530" y2="145" stroke-dasharray="4 4" opacity="0.1">
      <animate attributeName="stroke-dashoffset" values="0;-16" dur="1.9s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Floating particles -->
  <g>
    <circle r="1" fill="#7c3aed" opacity="0.5">
      <animateMotion path="M 100 50 Q 200 100 300 60 T 500 80" dur="12s" repeatCount="indefinite"/>
    </circle>
    <circle r="1.2" fill="#06b6d4" opacity="0.4">
      <animateMotion path="M 700 150 Q 600 100 500 140 T 300 120" dur="14s" repeatCount="indefinite"/>
    </circle>
    <circle r="0.8" fill="#10b981" opacity="0.5">
      <animateMotion path="M 200 180 Q 300 140 400 170 T 600 150" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle r="1" fill="#f59e0b" opacity="0.3">
      <animateMotion path="M 600 40 Q 500 80 400 50 T 200 70" dur="11s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Bottom label -->
  <text x="400" y="205" font-family="monospace" font-size="10" fill="#6b7280" text-anchor="middle" letter-spacing="4" opacity="0.7">
    ZERO-BACKEND · ONE-FILE · FULL CINEMATIC
    <animate attributeName="opacity" values="0.7;0.4;0.7" dur="6s" repeatCount="indefinite"/>
  </text>
</svg>
