name: Generate GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"   # Regenerates daily at midnight UTC
  workflow_dispatch:         # Can be triggered manually from Actions tab

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate Advanced Metrics Card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: sridhar242004
          template: classic
          base: header, activity, community, repositories
          config_timezone: Asia/Kolkata
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: bytes-size, lines, percentage
          plugin_languages_limit: 8
          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_stars: yes
          plugin_stars_limit: 4
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes
          plugin_achievements_limit: 0
          config_order: base.header, base.activity, languages, topics, stars, achievements
          filename: github-metrics.svg
          output_action: commit
          committer_branch: github-metrics
          committer_message: "chore: update GitHub metrics [skip ci]"

# SETUP REQUIRED:
# 1. Go to github.com → Settings → Developer settings → Personal access tokens
# 2. Generate a new token (classic) with: repo, read:user scopes
# 3. Copy the token
# 4. Go to your sridhar242004 repo → Settings → Secrets → Actions
# 5. Add new secret named: METRICS_TOKEN  (paste the token as value)
# 6. Run this workflow manually once from the Actions tab
