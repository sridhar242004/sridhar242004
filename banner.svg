<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320">
  <defs>
    <!-- Animated gradient mesh background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030210">
        <animate attributeName="stop-color" values="#030210;#0a0a2e;#030210" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#0e0545">
        <animate attributeName="stop-color" values="#0e0545;#1a0a3e;#0e0545" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#200a5a">
        <animate attributeName="stop-color" values="#200a5a;#4a1a90;#200a5a" dur="12s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Noise filter for texture -->
    <filter id="noise" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch">
        <animate attributeName="baseFrequency" values="0.65;0.75;0.65" dur="20s" repeatCount="indefinite"/>
      </feTurbulence>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.05"/>
      </feComponentTransfer>
    </filter>

    <!-- Neon glow filter -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur1"/>
      <feGaussianBlur stdDeviation="6" result="blur2"/>
      <feGaussianBlur stdDeviation="12" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur3"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Intense text glow -->
    <filter id="textGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur">
        <animate attributeName="stdDeviation" values="4;6;4" dur="3s" repeatCount="indefinite"/>
      </feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Circuit line glow -->
    <filter id="lineGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#7c3aed" stroke-width="0.3" opacity="0.15"/>
    </pattern>

    <!-- Clip path for text reveal -->
    <clipPath id="textClip">
      <rect x="0" y="0" width="1200" height="320">
        <animate attributeName="width" from="0" to="1200" dur="2.5s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
      </rect>
    </clipPath>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="320" fill="url(#bgGrad)"/>
  <rect width="1200" height="320" fill="url(#bgGrad)" opacity="0.9"/>

  <!-- Noise overlay -->
  <rect width="1200" height="320" filter="url(#noise)" opacity="0.4"/>

  <!-- Perspective grid -->
  <g opacity="0.12">
    <path d="M0 320 L600 120 L1200 320" fill="none" stroke="#7c3aed" stroke-width="1"/>
    <path d="M200 320 L600 120 L1000 320" fill="none" stroke="#7c3aed" stroke-width="0.5"/>
    <path d="M400 320 L600 120 L800 320" fill="none" stroke="#7c3aed" stroke-width="0.3"/>
    <line x1="0" y1="280" x2="1200" y2="280" stroke="#06b6d4" stroke-width="0.3" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="4s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="240" x2="1200" y2="240" stroke="#06b6d4" stroke-width="0.2" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="5s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Animated circuit lines -->
  <g filter="url(#lineGlow)" opacity="0.6">
    <path d="M0 80 L120 80 L140 60 L300 60" fill="none" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="8 4">
      <animate attributeName="stroke-dashoffset" from="100" to="0" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M1200 240 L1080 240 L1060 260 L900 260" fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="8 4">
      <animate attributeName="stroke-dashoffset" from="0" to="100" dur="4s" repeatCount="indefinite"/>
    </path>
    <path d="M0 200 L80 200 L100 180 L200 180" fill="none" stroke="#10b981" stroke-width="1" stroke-dasharray="6 3" opacity="0.5">
      <animate attributeName="stroke-dashoffset" from="50" to="0" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <circle cx="300" cy="60" r="2" fill="#06b6d4">
      <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="900" cy="260" r="2" fill="#7c3aed">
      <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Floating particles -->
  <g>
    <circle cx="150" cy="100" r="1.5" fill="#7c3aed" opacity="0.8">
      <animate attributeName="cy" values="100;80;100" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1050" cy="150" r="2" fill="#06b6d4" opacity="0.6">
      <animate attributeName="cy" values="150;130;150" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.1;0.6" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="250" r="1" fill="#10b981" opacity="0.7">
      <animate attributeName="cy" values="250;230;250" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="800" cy="90" r="1.5" fill="#f59e0b" opacity="0.5">
      <animate attributeName="cy" values="90;70;90" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="280" r="2.5" fill="#7c3aed" opacity="0.4">
      <animate attributeName="cy" values="280;260;280" dur="6.5s" repeatCount="indefinite"/>
      <animate attributeName="r" values="2.5;3.5;2.5" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Corner brackets -->
  <g stroke="#7c3aed" stroke-width="2" fill="none" opacity="0.8" filter="url(#lineGlow)">
    <path d="M40 40 L40 70 L70 70">
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M1160 40 L1160 70 L1130 70">
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="3.5s" repeatCount="indefinite"/>
    </path>
    <path d="M40 280 L40 250 L70 250">
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="4s" repeatCount="indefinite"/>
    </path>
    <path d="M1160 280 L1160 250 L1130 250">
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="3.2s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Hexagon decorations -->
  <g opacity="0.15" stroke="#7c3aed" stroke-width="1" fill="none">
    <path d="M100 140 L115 130 L115 115 L100 105 L85 115 L85 130 Z">
      <animateTransform attributeName="transform" type="rotate" from="0 100 122.5" to="360 100 122.5" dur="20s" repeatCount="indefinite"/>
    </path>
    <path d="M1100 180 L1115 170 L1115 155 L1100 145 L1085 155 L1085 170 Z">
      <animateTransform attributeName="transform" type="rotate" from="360 1100 162.5" to="0 1100 162.5" dur="25s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Main Title: SRIDHAR S -->
  <g transform="translate(600, 145)" text-anchor="middle">
    <!-- Shadow/Glow layers -->
    <text x="0" y="0" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="72" font-weight="800" fill="none" stroke="#7c3aed" stroke-width="8" opacity="0.3" filter="url(#neonGlow)">SRIDHAR S</text>
    <text x="0" y="0" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="72" font-weight="800" fill="none" stroke="#06b6d4" stroke-width="4" opacity="0.4" filter="url(#neonGlow)">SRIDHAR S</text>

    <!-- Animated stroke reveal -->
    <text x="0" y="0" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="72" font-weight="800" fill="none" stroke="#c4b5fd" stroke-width="2" stroke-dasharray="600" stroke-dashoffset="600" opacity="0.9">
      SRIDHAR S
      <animate attributeName="stroke-dashoffset" from="600" to="0" dur="2.5s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </text>

    <!-- Main fill with subtle flicker -->
    <text x="0" y="0" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="72" font-weight="800" fill="#ffffff" opacity="0">
      SRIDHAR S
      <animate attributeName="opacity" values="0;1;0.95;1;0.98;1" dur="4s" fill="freeze" begin="1.5s"/>
    </text>

    <!-- Accent line under name -->
    <line x1="-280" y1="25" x2="280" y2="25" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="1s" fill="freeze" begin="2s"/>
      <animate attributeName="x2" from="-280" to="280" dur="1.5s" fill="freeze" begin="2s" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </line>
  </g>

  <!-- Subtitle -->
  <g transform="translate(600, 195)" text-anchor="middle">
    <text x="0" y="0" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="16" font-weight="500" fill="#c4b5fd" letter-spacing="4" opacity="0">
      FULL-STACK AI ENGINEER · WEBGL CRAFTSMAN · IEEE AUTHOR
      <animate attributeName="opacity" from="0" to="1" dur="1.5s" fill="freeze" begin="2.5s"/>
      <animate attributeName="letter-spacing" values="4;6;4" dur="8s" repeatCount="indefinite" begin="4s"/>
    </text>
  </g>

  <!-- Bottom status bar -->
  <g transform="translate(600, 260)" text-anchor="middle">
    <rect x="-200" y="-12" width="400" height="24" rx="12" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="4s" repeatCount="indefinite"/>
    </rect>
    <text x="0" y="4" font-family="'JetBrains Mono', monospace" font-size="11" fill="#06b6d4" opacity="0.8" text-anchor="middle">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
      ZERO-BACKEND ARCHITECT · 113 REPOSITORIES · ONE-FILE SHIPS
    </text>
  </g>

  <!-- Scanline effect -->
  <line x1="0" y1="0" x2="1200" y2="0" stroke="#ffffff" stroke-width="1" opacity="0.03">
    <animate attributeName="y1" from="0" to="320" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="y2" from="0" to="320" dur="8s" repeatCount="indefinite"/>
  </line>
</svg>